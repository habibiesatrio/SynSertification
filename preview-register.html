<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Registrasi | DEM Indonesia Sertification</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
         :root {
            --primary-color: #0056b3;
            --secondary-color: #6c757d;
            --background-color: #f4f7f6;
            --card-background: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }
        
        body {
            background-color: var(--background-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .dem-login-container {
            width: 100%;
            max-width: 450px;
        }
        
        .dem-login-card {
            background: var(--card-background);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .dem-login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .dem-logo-placeholder {
            width: 60px;
            height: 60px;
            background: var(--primary-color);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
        }
        
        .dem-login-header h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin: 0;
        }
        
        .dem-form-group {
            margin-bottom: 20px;
        }
        
        .dem-form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .dem-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
        }
        
        .dem-btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .dem-login-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--secondary-color);
        }
    </style>
</head>

<body class="dem-login-body">

    <div class="dem-login-container">
        <a href="preview-login.html" class="dem-back-to-home">
            <i data-lucide="arrow-left" style="margin-right: 8px; width: 16px;"></i> Kembali ke Login
        </a>

        <div class="dem-login-card">
            <div class="dem-login-header">
                <div class="dem-logo-placeholder">DEM</div>
                <h1>Registrasi Akun</h1>
                <p>Portal Sertifikasi DEM Indonesia</p>
            </div>
            <form onsubmit="window.location.href='preview-dashboard.html'; return false;">
                <div class="dem-form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" class="dem-input" placeholder="Nama sesuai KTP/Sertifikat">
                </div>
                <div class="dem-form-group">
                    <label>Username</label>
                    <input type="text" class="dem-input" placeholder="Pilih username">
                </div>
                <div class="dem-form-group">
                    <label>Email</label>
                    <input type="email" class="dem-input" placeholder="nama@email.com">
                </div>
                <div class="dem-form-group">
                    <label>Password</label>
                    <input type="password" class="dem-input" placeholder="Minimal 8 karakter">
                </div>
                <button class="dem-btn-login">DAFTAR SEKARANG</button>
            </form>
            <div class="dem-login-footer">
                <p>Sudah punya akun? <a href="preview-login.html" style="color: var(--primary-color); font-weight: bold; text-decoration: none;">Login di sini</a></p>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
